services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  api-gateway:
    build:
      context: ./apps/api-gateway
    volumes:
      - ./apps/api-gateway:/srv/app
      - api_gateway_node_modules:/srv/app/node_modules
    command: npm run start:dev
    env_file: ./apps/api-gateway/.env
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./apps/frontend
    volumes:
      - ./apps/frontend:/srv/app
      - nextjs_node_modules_data:/srv/app/node_modules
    command: npm run dev
    env_file: ./apps/frontend/.env
    ports:
      - "3000:3000"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  nextjs_node_modules_data:
  postgres_data:
  api_gateway_node_modules:
  form_gen_node_modules:
